AWSTemplateFormatVersion: '2010-09-09'

Description: Portfolio EC2 Deployment

Resources:

  PortfolioSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  PortfolioInstance:
    Type: AWS::EC2::Instance

    Properties:

      InstanceType: t3.small

      ImageId: ami-0ec10929233384c7f

      KeyName: devops

      SecurityGroupIds:
        - !Ref PortfolioSecurityGroup

      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          amazon-linux-extras install docker -y
          service docker start
          systemctl enable docker
          usermod -aG docker ec2-user

Outputs:

  PublicIP:
    Description: EC2 Public IP
    Value: !GetAtt PortfolioInstance.PublicIp