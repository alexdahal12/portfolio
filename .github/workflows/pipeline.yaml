name: "Deploy to Server"

on:
  push:
      branches:
        - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_IP: ${{ vars.SERVER_IP }}

    steps:
      - uses: actions/checkout@v3

      - name: "Build Docker Image"
        run: |
          docker login -u alexdahal12 -p $DOCKERHUB_PAT
          docker build -t alexdahal12/mywebapp .
          docker push alexdahal12/mywebapp
        env:
          DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}

      - name: "Configure SSH"
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      
      - name: "Put SSH Key in Docker file for Server Access"
        run: |
          touch pem.pem
          echo $EC2_SSH_KEY | base64 -d > pem.pem && chmod 400 pem.pem
          ssh-keygen -R $SERVER_IP
        env: 
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: "Docker Pull and Restart Docker"
        run: |
          ssh -t ubuntu@$SERVER_IP -i pem.pem 'docker pull alexdahal12/portfolio '
          ssh -t ubuntu@$SERVER_IP -i pem.pem 'docker stop portfolio && docker rm portfolio'
          ssh -t ubuntu@$SERVER_IP -i pem.pem 'docker run --name portfolio -p 8080:80 -d alexdahal12/portfolio'
